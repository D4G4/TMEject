name: TMEject
options:
  bundleIdPrefix: co.dls.tmeject
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: en
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
targets:
  TMEject:
    type: application
    platform: macOS
    sources:
      - path: TMEject
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.dls.tmeject
        PRODUCT_NAME: TMEject
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleDisplayName: TMEject
        INFOPLIST_KEY_SUFeedURL: "https://d4g4.github.io/TMEject/appcast.xml"
        INFOPLIST_KEY_SUEnableAutomaticChecks: YES
        INFOPLIST_KEY_SUScheduledCheckInterval: 86400
        # PRIVATE EdDSA key lives in the user's keychain (see docs/release-setup.md).
        # The PUBLIC half goes here. <TODO> until the user runs `generate_keys` once;
        # release.sh refuses to ship if this is still <TODO>.
        INFOPLIST_KEY_SUPublicEDKey: "<TODO>"
        CODE_SIGN_ENTITLEMENTS: TMEject/TMEject.entitlements
        ENABLE_APP_SANDBOX: NO
  TMEjectTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TMEjectTests
    dependencies:
      - target: TMEject
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.dls.tmeject.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TMEject.app/Contents/MacOS/TMEject"
