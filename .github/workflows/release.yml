name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

jobs:
  # ── Build, sign, notarize, EdDSA-sign the macOS DMG ──────────────
  macos:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      # fetch-depth: 0 is REQUIRED — build-release.sh derives the
      # CFBundleVersion from `git rev-list --count HEAD`, which returns
      # 1 on a shallow (default) checkout. CFBundleVersion=1 = Sparkle
      # tells every installed user "you're up to date" regardless of
      # marketing version.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION"

      - name: Install tools
        run: brew install xcodegen create-dmg

      # Import the Developer ID Application certificate into a fresh
      # temporary keychain. Keychain is torn down when the runner job
      # completes — secrets never persist on disk.
      - name: Import Developer ID signing cert
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -e
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          CERT_PATH=$RUNNER_TEMP/cert.p12

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Sanity check
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # Store the App Store Connect API key as a notarytool keychain
      # profile so xcrun notarytool can submit the DMG. Profile name
      # AC_NOTARY matches what scripts/release.sh expects.
      - name: Setup notarytool credentials
        env:
          AC_API_KEY_BASE64: ${{ secrets.AC_API_KEY_BASE64 }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          set -e
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_${AC_API_KEY_ID}.p8
          echo -n "$AC_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          xcrun notarytool store-credentials AC_NOTARY \
            --key "$KEY_PATH" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID"

      # Resolve SPM packages so sign_update (inside Sparkle SPM checkout)
      # is on disk before release.sh tries to use it.
      - name: Resolve SPM packages (needed to find sign_update)
        run: |
          xcodegen generate
          xcodebuild -project TMEject.xcodeproj -scheme TMEject \
            -resolvePackageDependencies > /dev/null

      # Stage the Sparkle EdDSA private key as a file. release.sh's
      # sign_update call uses --ed-key-file to read from this path
      # instead of the keychain — bypasses the ACL prompt that hangs
      # headless runners.
      - name: Decode Sparkle EdDSA private key to file
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -e
          echo -n "$SPARKLE_PRIVATE_KEY" | base64 --decode > "$RUNNER_TEMP/sparkle.key"
          chmod 600 "$RUNNER_TEMP/sparkle.key"

      # Build + sign + notarize + staple + EdDSA-sign DMG.
      - name: Build signed + notarized + EdDSA-signed DMG
        env:
          SPARKLE_PRIVATE_KEY_FILE: ${{ runner.temp }}/sparkle.key
        run: bash scripts/release.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TMEject-macOS
          path: build/TMEject.dmg

      - name: Upload appcast item artifact
        uses: actions/upload-artifact@v4
        with:
          name: TMEject-appcast-item
          path: build/appcast-item.xml

  # ── GitHub Release ───────────────────────────────────────────────
  release:
    needs: macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: TMEject-macOS
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Pre-release tags (v*-beta.*, v*-rc.*) get marked as Pre-release
          # so they don't appear as "Latest release" on the repo home page.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/TMEject.dmg

  # ── Publish Sparkle appcast + redeploy site ──────────────────────
  # Must run after `release` so the DMG enclosure URL is live by the
  # time the appcast is published. Otherwise the first user to fetch
  # the new appcast would hit a 404 on download.
  appcast:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download appcast item
        uses: actions/download-artifact@v4
        with:
          name: TMEject-appcast-item
          path: artifacts

      # Splice the new <item> into site/appcast.xml right after the
      # <language>en</language> tag (top of <channel>). awk handles the
      # multi-line insertion without shelling out to sed.
      - name: Splice into site/appcast.xml
        run: |
          set -e
          awk '
            /<language>en<\/language>/ {
              print
              while ((getline line < "artifacts/appcast-item.xml") > 0)
                print line
              close("artifacts/appcast-item.xml")
              next
            }
            { print }
          ' site/appcast.xml > site/appcast.xml.new
          mv site/appcast.xml.new site/appcast.xml

      - name: Commit and push appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/appcast.xml
          git commit -m "chore(appcast): publish ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      # Subtree-split site/ into gh-pages branch and force-push so the
      # updated appcast goes live for installed users on their next
      # scheduled Sparkle check.
      - name: Deploy to gh-pages
        run: |
          set -e
          git fetch origin
          git branch -D gh-pages 2>/dev/null || true
          git subtree split --prefix site HEAD -b gh-pages
          git push origin gh-pages --force
